name: Deploy Infrastructure

on:
  workflow_dispatch:
    inputs:
      vm_size:
        description: "VM-grootte overschrijven (leeg = gebruik GitHub Variable VM_SIZE)"
        required: false
        default: ""
      use_spot:
        description: "Gebruik Azure Spot pricing (goedkoper, maar kan worden geëvicteerd)"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - "true"
          - "false"
      recreate_vm:
        description: "Verwijder en hermaak alleen de VM (disk blijft intact)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      destroy:
        description: "Typ 'true' om alle resources te verwijderen"
        required: false
        default: "false"

permissions:
  contents: read

env:
  TF_DIR: ./terraform
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

jobs:
  terraform:
    name: Terraform ${{ github.event.inputs.destroy == 'true' && 'Destroy' || 'Apply' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.TF_BACKEND_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.TF_BACKEND_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ secrets.TF_BACKEND_CONTAINER }}"

      - name: Bepaal VM-grootte en Spot instelling
        id: vmsize
        run: |
          INPUT="${{ github.event.inputs.vm_size }}"
          VAR="${{ vars.VM_SIZE }}"
          SIZE="${INPUT:-${VAR:-Standard_D8s_v5}}"
          echo "size=$SIZE" >> "$GITHUB_OUTPUT"
          echo "VM-grootte: $SIZE"

          SPOT_INPUT="${{ github.event.inputs.use_spot }}"
          SPOT_VAR="${{ vars.USE_SPOT }}"
          SPOT="${SPOT_INPUT:-${SPOT_VAR:-false}}"
          echo "spot=$SPOT" >> "$GITHUB_OUTPUT"
          echo "Spot: $SPOT"

      - name: Azure Login
        if: github.event.inputs.recreate_vm == 'true' || github.event.inputs.destroy == 'true'
        uses: azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}"
            }

      - name: VM opstarten voor recreate (Terraform vereist running VM om te verwijderen)
        if: github.event.inputs.recreate_vm == 'true'
        run: |
          STATE=$(az vm get-instance-view \
            --resource-group "${{ vars.RESOURCE_GROUP_NAME }}" \
            --name "${{ vars.VM_NAME }}" \
            --query "instanceView.statuses[?starts_with(code, 'PowerState/')].code" \
            --output tsv 2>/dev/null || echo "PowerState/unknown")
          echo "VM-status: $STATE"
          if [ "$STATE" != "PowerState/running" ]; then
            echo "VM opstarten..."
            az vm start \
              --resource-group "${{ vars.RESOURCE_GROUP_NAME }}" \
              --name "${{ vars.VM_NAME }}"
            az vm wait \
              --resource-group "${{ vars.RESOURCE_GROUP_NAME }}" \
              --name "${{ vars.VM_NAME }}" \
              --custom "instanceView.statuses[?code=='PowerState/running']"
            echo "VM is actief."
          else
            echo "VM is al actief, doorgaan."
          fi

      - name: Terraform Plan
        working-directory: ${{ env.TF_DIR }}
        run: |
          EXTRA_FLAGS=""
          if [ "${{ github.event.inputs.destroy }}" = "true" ]; then
            EXTRA_FLAGS="-destroy"
          elif [ "${{ github.event.inputs.recreate_vm }}" = "true" ]; then
            # Vervangt alleen de VM en de disk-koppeling; de data disk zelf blijft intact.
            EXTRA_FLAGS="-replace=azurerm_linux_virtual_machine.ollama -replace=azurerm_virtual_machine_data_disk_attachment.ollama_models"
          fi

          terraform plan $EXTRA_FLAGS \
            -var="location=${{ vars.AZURE_LOCATION }}" \
            -var="resource_group_name=${{ vars.RESOURCE_GROUP_NAME }}" \
            -var="vm_name=${{ vars.VM_NAME }}" \
            -var="vm_size=${{ steps.vmsize.outputs.size }}" \
            -var="vm_data_disk_size_gb=${{ vars.VM_DATA_DISK_SIZE_GB }}" \
            -var="ssh_public_key=${{ secrets.SSH_PUBLIC_KEY }}" \
            -var="allowed_ip=${{ vars.ALLOWED_IP }}" \
            -var="ollama_port=${{ vars.OLLAMA_PORT }}" \
            -var="default_model=${{ vars.DEFAULT_MODEL }}" \
            -var="use_spot=${{ steps.vmsize.outputs.spot }}" \
            -out=tfplan

      - name: Terraform Apply
        working-directory: ${{ env.TF_DIR }}
        run: terraform apply -auto-approve tfplan

      - name: Verbindingsgegevens tonen
        if: github.event.inputs.destroy != 'true'
        working-directory: ${{ env.TF_DIR }}
        run: |
          echo "## Ollama Deployment Geslaagd" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|--|--|" >> $GITHUB_STEP_SUMMARY
          echo "| Publiek IP | $(terraform output -raw public_ip_address) |" >> $GITHUB_STEP_SUMMARY
          echo "| SSH | \`$(terraform output -raw ssh_command)\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Ollama API | \`$(terraform output -raw ollama_api_url)\` |" >> $GITHUB_STEP_SUMMARY
          echo "| VM-grootte | ${{ steps.vmsize.outputs.size }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> **Volgende stap:** Voer de 'Stop Ollama VM' workflow uit zodat de VM niet onnodig doorloopt." >> $GITHUB_STEP_SUMMARY
